<section class="local-seo-map-section" style="padding: 60px 20px; background-color: #f9f9f9; text-align: center;">
  <div class="container" style="max-width: 1200px; margin: 0 auto;">
    <h2 style="font-size: 2.5rem; margin-bottom: 20px;">{{title}}</h2>
    <p style="font-size: 1.2rem; color: #555; max-width: 800px; margin: 0 auto 40px;">{{description}}</p>
    <div class="map-container" style="border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); height: 400px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center;">
      <!-- Real implementation would embed an iframe or Maps API script here -->
      <span style="font-size: 1.5rem; color: #777;">[ Interactive Map for {{title}} ]</span>
    </div>
  </div>
</section>
